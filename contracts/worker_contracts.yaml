# Worker Contracts — Day 09 Lab
# Định nghĩa input/output rõ ràng cho từng worker.
# Supervisor và workers phải tuân theo contract này.
#
# Rule: Supervisor giữ quyết định luồng. Worker giữ domain skill.
#       Contract là ranh giới rõ ràng giữa hai bên.
#
# TODO Sprint 2: Cập nhật "actual_implementation" khi đã implement xong.

version: "1.1"
updated_at: "2026-04-14"

# ─────────────────────────────────────────────
# Supervisor
# ─────────────────────────────────────────────

supervisor:
  name: supervisor
  description: "Phân tích task và quyết định route. KHÔNG tự trả lời domain knowledge."
  input:
    task:
      type: string
      required: true
      description: "Câu hỏi từ user"
  output:
    supervisor_route:
      type: string
      enum: ["retrieval_worker", "policy_tool_worker", "human_review"]
      required: true
    route_reason:
      type: string
      required: true
      description: "Lý do cụ thể tại sao chọn route này (không được để 'unknown')"
    risk_high:
      type: boolean
      required: true
    needs_tool:
      type: boolean
      required: true
  routing_rules:
    - condition: "task chứa 'hoàn tiền', 'refund', 'flash sale', 'license', 'cấp quyền', 'access level'"
      route: "policy_tool_worker"
    - condition: "task chứa 'P1', 'SLA', 'ticket', 'escalation', 'sự cố'"
      route: "retrieval_worker"
    - condition: "task chứa mã lỗi không rõ (ERR-xxx) VÀ không có context"
      route: "human_review"
    - condition: "default"
      route: "retrieval_worker"
  constraints:
    - "Supervisor không được tự trả lời policy questions"
    - "route_reason KHÔNG được là chuỗi rỗng hoặc 'unknown'"
    - "Nếu risk_high=True → luôn ghi lý do cụ thể"

# ─────────────────────────────────────────────
# Retrieval Worker
# ─────────────────────────────────────────────

retrieval_worker:
  name: retrieval_worker
  file: workers/retrieval.py
  description: "Tìm kiếm chunks bằng chứng từ Knowledge Base. Stateless — test độc lập được."
  input:
    task:
      type: string
      required: true
      description: "Câu hỏi cần tìm evidence"
    top_k:
      type: integer
      required: false
      default: 3
      description: "Số chunks cần retrieve"
  output:
    retrieved_chunks:
      type: array
      required: true
      description: "List of chunk objects"
      items:
        text: string
        source: string
        score: float  # 0.0 - 1.0 (cosine similarity)
        metadata: object
    retrieved_sources:
      type: array
      required: true
      description: "Unique list of source filenames"
    worker_io_logs:
      type: array
      required: true
      description: "Log input/output của worker (append to array)"
  error_format:
    code: "RETRIEVAL_FAILED"
    reason: string
  constraints:
    - "Phải trả về ít nhất 1 chunk nếu tìm thấy"
    - "Nếu không tìm thấy → retrieved_chunks=[] (không trả về fake chunks)"
    - "Score phải là float trong khoảng [0, 1]"
    - "Stateless: không đọc hoặc ghi state ngoài những gì được khai báo ở trên"
  actual_implementation:
    status: "done"
    notes: "Dense retrieval với all-MiniLM-L6-v2, ChromaDB cosine similarity, top_k=3 default"

# ─────────────────────────────────────────────
# Policy Tool Worker
# ─────────────────────────────────────────────

policy_tool_worker:
  name: policy_tool_worker
  file: workers/policy_tool.py
  description: "Kiểm tra policy và xử lý exceptions. Có thể gọi MCP tools khi cần."
  input:
    task:
      type: string
      required: true
    retrieved_chunks:
      type: array
      required: false
      description: "Context từ retrieval_worker (nếu đã có)"
    needs_tool:
      type: boolean
      required: false
      default: false
      description: "True → worker được phép gọi MCP tools"
  output:
    policy_result:
      type: object
      required: true
      properties:
        policy_applies:
          type: boolean
          description: "True nếu policy cho phép, False nếu bị chặn"
        policy_name:
          type: string
          example: "refund_policy_v4"
        exceptions_found:
          type: array
          description: "Danh sách exceptions tìm thấy"
          items:
            type: object
            properties:
              type: string  # e.g., "flash_sale_exception"
              rule: string  # Câu policy rule cụ thể
              source: string
        source:
          type: array
          description: "Nguồn tài liệu đã dùng"
        policy_version_note:
          type: string
          description: "Note về version nếu có vấn đề temporal scoping"
    mcp_tools_used:
      type: array
      description: "Danh sách MCP tool calls thực hiện"
      items:
        tool: string
        input: object
        output: object
        error: object | null
        timestamp: string
    worker_io_logs:
      type: array
      required: true
  error_format:
    code: "POLICY_CHECK_FAILED"
    reason: string
  constraints:
    - "Phải detect exception cases: flash_sale, digital_product, activated_product"
    - "Phải ghi tên MCP tool đã gọi vào mcp_tools_used"
    - "Không được tự bịa policy rules không có trong tài liệu"
  actual_implementation:
    status: "done"
    notes: "Rule-based exception detect (Flash Sale, digital product, activated). MCP check_access_permission + get_ticket_info khi access keywords detected"

# ─────────────────────────────────────────────
# Synthesis Worker
# ─────────────────────────────────────────────

synthesis_worker:
  name: synthesis_worker
  file: workers/synthesis.py
  description: "Tổng hợp câu trả lời từ evidence. Gọi LLM với grounded prompt. Hỗ trợ retry với judge_feedback."
  input:
    task:
      type: string
      required: true
    retrieved_chunks:
      type: array
      required: false
      description: "Evidence từ retrieval_worker"
    policy_result:
      type: object
      required: false
      description: "Policy check result từ policy_tool_worker"
    judge_feedback:
      type: string
      required: false
      description: "Feedback từ judge_worker nếu đang retry (rỗng ở lần đầu)"
  output:
    final_answer:
      type: string
      required: true
      description: "Câu trả lời cuối có citation"
    sources:
      type: array
      required: true
      description: "Sources được cite trong answer"
    confidence:
      type: float
      required: true
      description: "Mức độ tin cậy 0.0-1.0"
    worker_io_logs:
      type: array
      required: true
  error_format:
    code: "SYNTHESIS_FAILED"
    reason: string
  constraints:
    - "Phải có citation [source_name] trong answer nếu có chunks"
    - "Nếu retrieved_chunks=[] → phải abstain, không hallucinate"
    - "Nếu judge_feedback != '' → thêm vào prompt để cải thiện"
    - "Không được dùng kiến thức ngoài context được cung cấp"
  actual_implementation:
    status: "done"
    notes: "gpt-4o-mini, temperature=0.1. Retry: nhận judge_feedback → thêm vào user prompt. Reset judge_feedback='' sau khi dùng"

# ─────────────────────────────────────────────
# MCP Server
# ─────────────────────────────────────────────

mcp_server:
  name: mcp_server
  file: mcp_server.py
  description: "Mock MCP Server expose tools cho workers qua dispatch_tool()."
  tools:
    search_kb:
      input:
        query: string  # required
        top_k: integer  # default: 3
      output:
        chunks: array
        sources: array
        total_found: integer
    get_ticket_info:
      input:
        ticket_id: string  # required (e.g., "P1-LATEST", "IT-1234")
      output:
        ticket_id: string
        priority: string
        status: string
        assignee: string
        created_at: string
        sla_deadline: string
        notifications_sent: array
    check_access_permission:
      input:
        access_level: integer  # 1, 2, hoặc 3
        requester_role: string
        is_emergency: boolean  # default: false
      output:
        can_grant: boolean
        required_approvers: array
        emergency_override: boolean
        notes: array
        source: string
    create_ticket:
      input:
        priority: string  # P1, P2, P3, P4
        title: string
        description: string
      output:
        ticket_id: string
        url: string
        created_at: string
  constraints:
    - "dispatch_tool() phải trả về error dict nếu tool không tồn tại"
    - "list_tools() phải trả về đúng format MCP tool schema"
    - "Không được raise exception ra ngoài dispatch_tool()"
  actual_implementation:
    status: "done"
    notes: "Mock Python class (Standard level). 4 tools: search_kb, get_ticket_info, check_access_permission, create_ticket. Gọi từ policy_tool.py qua dispatch_tool()"

# ─────────────────────────────────────────────
# Judge Worker (Sprint 3+ bonus — LLM-as-Judge)
# ─────────────────────────────────────────────

judge_worker:
  name: judge_worker
  file: workers/judge.py
  description: "Đánh giá chất lượng câu trả lời từ synthesis_worker. Quyết định PASS (→ END) hoặc RETRY (→ synthesis_worker)."
  input:
    task:
      type: string
      required: true
    final_answer:
      type: string
      required: true
      description: "Câu trả lời cần đánh giá"
    retrieved_chunks:
      type: array
      required: false
      description: "Context gốc để so sánh faithfulness"
    judge_iterations:
      type: integer
      required: true
      description: "Số lần judge đã chạy (dùng để giới hạn retry)"
  output:
    judge_score:
      type: float
      description: "Overall score 0.0-1.0 (faithfulness×0.4 + completeness×0.35 + relevance×0.25)"
    judge_feedback:
      type: string
      description: "Nếu RETRY: mô tả cụ thể điểm cần cải thiện. Nếu PASS: chuỗi rỗng"
    judge_verdict:
      type: string
      enum: ["PASS", "RETRY"]
      description: "PASS → graph route tới END. RETRY → graph route tới synthesis_worker"
    judge_iterations:
      type: integer
      description: "Incremented sau mỗi lần judge chạy"
    worker_io_logs:
      type: array
      required: true
  routing_logic:
    PASS_condition: "judge_score >= 0.70 OR judge_iterations >= MAX_RETRIES"
    RETRY_condition: "judge_score < 0.70 AND judge_iterations < MAX_RETRIES (=2)"
    fail_safe: "Nếu LLM judge lỗi → verdict=PASS, score=0.5 (không block pipeline)"
  error_format:
    code: "JUDGE_FAILED"
    reason: string
  constraints:
    - "Không được tự sửa câu trả lời — chỉ đánh giá và ghi feedback"
    - "temperature=0.0 để đánh giá nhất quán"
    - "Fail-safe: LLM lỗi → PASS, không raise exception"
  actual_implementation:
    status: "done"
    notes: "gpt-4o-mini temperature=0.0, response_format json_object. PASS_THRESHOLD=0.70, MAX_RETRIES=2. Gemini fallback nếu OpenAI lỗi"
